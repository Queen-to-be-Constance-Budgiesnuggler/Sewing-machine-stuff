schema_version: 1

machine:
  slug: pfaff-quilt-expression-720
  brand: Pfaff
  model: Quilt Expression 720
  aliases:
    - "Quilt expression 720"
    - "QE720"
    - "Quilt Expression 720"
  manual_pdf: manuals/pfaff-quilt-expression-720/Pfaff-Quilt-Expression-720-SM-ijvmix.pdf
  manual_version: "104 73 71-26"
  source_pages: 93
  notes: >
    Service manual, version 27 March 2020, (c) 2020 VSM Group AB. This is a SERVICE
    manual for workshop/dealer technicians, not an end-user manual.
    Authoring note: the source PDF's own body text contains numeric cross-references
    to other settings (e.g. "This setting affects: 11. The needle bar height") that do
    NOT match the current Settings table-of-contents numbering -- most are off by 2,
    apparently because two settings ("8. Cut sensor calibration" and "9. Setting the
    feed unit sideways") were inserted into the sequence during a later manual revision
    and downstream cross-references were never updated to match. A few references are
    off by other amounts, or not offset at all (references to settings 1-5 are usually
    correct as printed). Every related_settings/settings_to_recheck cross-reference in
    this file was therefore resolved by matching the referenced setting's TITLE against
    the current TOC, not by trusting the printed number -- so numbers here are reliable
    even where the raw PDF text is not.

