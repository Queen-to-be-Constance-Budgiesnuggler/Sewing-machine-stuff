  - component: "Sewing head re-building (swapping the whole head unit)"
    page: 73
    tools_needed: ["Torx 10", "Torx 8", "Torx 6", "Torx 20"]
    dismantle_steps:
      - "Remove the sewing head from the machine (see 'Sewing head' procedure)."
      - "Disconnect all LED cables from the connecting card; remove the 2 Torx 10 screws (A) holding the LED lights; remove both LED lights (B)."
      - "Disconnect the Zigzag and presser bar step motor cables from the connecting card."
      - "Disconnect the buttonhole sensor cable; remove the Torx 6 screw (C) holding the buttonhole sensor; remove the buttonhole sensor (D) (to be mounted onto the replacement sewing head)."
      - "Remove the 2 Torx 10 screws (E) holding the presser bar unit; remove the presser bar unit (F); remove the large presser bar cog wheel (G), small cog wheel (H), and pin (I)."
      - "Loosen the screw that holds the p-bar shield (J); remove the p-bar shield (J)."
      - "Remove the outer C-clip (K) holding the thread take-up (L); remove the thread take-up (L) (note the flat washer and wave washer on the thread take-up shaft)."
      - "To remove the presser bar (R): loosen the presser bar's Torx 8 set screw (M) and the IDT connecting bracket's Torx 8 screw (A); remove the presser bar; unhook the presser bar spring (N) from the presser bar connecting lever pin (Q); remove the presser bar connecting bracket (O)."
      - "Check the presser bar moves up and down freely."
      - "Remove the 2 Torx 10 screws (S) holding the Zigzag step motor; remove the Zigzag step motor (T); remove the Zigzag calibration stop Torx 10 screw (U) and calibration stop (V)."
      - "Pull the needle bar to its down position; note the distance between the needle bar's top and the frame (AA); loosen the crosshead's Torx 10 screw (Y); loosen the needle thread stop's Torx 10 screw (Z); remove the needle bar by pulling it down."
    mount_steps:
      - "Place the spring (N) on the replacement sewing head's presser bar connecting bracket pin (P) and hook it onto the presser bar lever pin (Q)."
      - "Mount the presser bar (R) in the replacement sewing head, pushing it up just a little; put on the IDT unit and push the presser bar up through the IDT connecting bracket; push through the presser bar connecting bracket (O); align the mark on the presser bar with the set-screw holes on both the presser bar set screw (M) and the IDT connecting bracket screw (A) before tightening, without moving the presser bar from its position."
      - "Place the Zigzag calibration stop (V) in the replacement sewing head with the eccentricity on top; hold it with a finger and mount the Torx 10 screw (U)."
      - "Mount the pin (I), small presser bar cog wheel (H, smaller part to the top), and large cog wheel (G) onto the large cog wheel's pin (X) -- NOTE this pin may be missing and need to be retrieved from the old sewing head; the 3 cog wheels should now be connected."
      - "Place the presser bar unit (F) on the replacement sewing head, connect the large cog wheel (G) to the presser bar lever (O), mount the 2 Torx 10 screws (E), mount the presser bar sensor shield (J) inside the sensor, tighten the Torx 20 screw."
      - "Take the replacement sewing head and mount the needle bar, pushing it up a bit; mount the cross head and needle threader stop, pre-set with the cross head against the base and the needle bar's top at the small distance (AA) shown; tighten cross head screw (Y); before tightening the needle thread stop screw (Z), make a 1.5 mm distance between the needle threader stop and the cross head."
      - "Mount the presser foot holder and presser foot; put in a new #90 needle; set the needle to centre position against the presser foot by hand."
      - "Mount the Zigzag step motor (T) with the cogwheel's setting screw (BB) in the middle when viewed from the side of the sewing head; the needle should still be centred against the presser foot; mount the 2 screws (S)."
      - "Mount both LED lights (B), fasten with screws (A); connect all cables."
      - "Mount the inner C-clip holding the thread take-up in position (measure the distance on the old sewing head); mount a straight metal washer, the thread take-up, a metal wave washer, then the C-clip from the old sewing head onto the replacement head (should have no play but move freely). NOTE: when the thread tension unit is mounted, the thread take-up must be centred in the thread take-up window."
      - "Mount the sewing head on the machine (see 'Sewing head' procedure)."
    settings_to_recheck: [5, 10, 12, 13, 15, 18, 19, 20]

