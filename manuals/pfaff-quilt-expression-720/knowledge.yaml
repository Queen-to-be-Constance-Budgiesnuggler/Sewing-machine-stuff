fault_finding:
  - symptom: "The machine does not work when the foot control is pressed, but works when pushing the start button."
    checks:
      - "Check that the contact of the cord device of the cord is correctly pushed into the potentiometer."
      - "Check by means of a new foot control (potentiometer, cord device)."
      - "Try a new transformer."
    replace_order: []
    notes: null

  - symptom: "The machine does not start when either foot control or start button is pressed."
    checks:
      - "Check that the bobbin stop sensor is not activated."
      - "Try a new motor."
      - "Try a new circuit board."
    replace_order: ["motor", "circuit board"]
    notes: null

  - symptom: "The machine races when switched on or started."
    checks:
      - "Check that the start button does not stay pressed."
      - "If the machine only races when the foot control is connected, then check the foot control."
      - "Try a new circuit board."
    replace_order: ["foot control", "circuit board"]
    notes: null

  - symptom: "The zig-zag movement of the machine does not work correctly."
    checks:
      - "Check that the twin needle isn't activated."
      - "Check in the Service Program - Sensor menu that the sector forward is working, should read from 0-31."
      - "If error: check first that the cable between the sensor board and Main PC-board is correctly inserted and not damaged."
      - "Check the synchronizing screen is not damaged; if damaged, replace the screen."
      - "Still error: replace the sensor board."
      - "Check that the cable connection of the step motor to the circuit board is correctly inserted and not damaged."
      - "Check the signals of the circuit board to the step motor."
      - "If the step motor is working, replace the circuit board."
      - "If the step motor is not working, replace the sewing head complete, or the step motor."
    replace_order: ["synchronizer screen", "sensor board", "circuit board", "sewing head complete or step motor"]
    notes: null

  - symptom: "The feeding movement of the machine does not work correctly."
    checks:
      - "Check that the twin needle isn't activated."
      - "Check in the Service Program - Sensor menu that the sector forward is working, should read from 0-31."
      - "If error: check first that the cable between the sensor board and Main PC-board is correctly inserted and not damaged."
      - "Check the synchronizing/stop-right screen is not damaged; if damaged, replace the screen."
      - "Still error: replace the sensor board."
      - "Check that the cable connection of the step motor to the circuit board is correctly inserted and not damaged."
      - "Check the signals of the circuit board to the step motor."
      - "If the step motor is working, replace the circuit board."
      - "If the step motor is not working, replace the step motor."
    replace_order: ["synchronizer/stop-right screen", "sensor board", "circuit board", "step motor"]
    notes: null

  - symptom: "The stitch length balance of the machine is not correct (buttonholes, pattern stitches, letters)."
    checks:
      - "Always use the correct presser foot."
      - "Check the feed dog height (setting 11)."
      - "Check the pre-setting of the feeding step motor (setting 26)."
      - "Check that there is no friction in the feeding mechanism."
      - "Adjust the stitch length balance (setting 24)."
    replace_order: []
    notes: null

  - symptom: "The thread tension does not work."
    checks:
      - "Check the cable connections between the (thread tension) step motor and circuit board are correctly inserted and not damaged."
      - "Try a new step motor."
      - "Try a new circuit board."
    replace_order: ["step motor", "circuit board"]
    notes: null

  - symptom: "The machine does not alarm when the lower thread ends."
    checks:
      - "Check the lower thread sensor in the service program by rotating the hand wheel slowly."
      - "Check that cables to the circuit board are correctly inserted and not damaged."
      - "Try a new lower thread sensor cable."
    replace_order: ["lower thread sensor cable"]
    notes: "Before doing any service, clean both diodes of the lower thread sensor and remove all fluff and grease."
